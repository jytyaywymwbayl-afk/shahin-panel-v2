<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شاهین پنل</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="mobile-btn" onclick="toggleMenu()">
☰
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">

<div class="logo">

🦅 شاهین پنل

</div>

<div class="menu">

<div class="menu-item active">
🏠 داشبورد
</div>

<div class="menu-item">
👥 کاربران
</div>

<div class="menu-item">
📡 کانفیگ‌ها
</div>

<div class="menu-item">
⚙ تنظیمات
</div>

<div class="menu-item">
🌐 GitHub
</div>

</div>

</div>

<div class="main">

<div id="dashboard-page">

<div class="topbar">

<div>

<h2>داشبورد</h2>

<p>پنل مدیریت شاهین</p>

</div>

</div>

<div class="cards">

<div class="card">

<h3>کاربران</h3>

<span id="usersCount">0</span>

</div>

<div class="card">

<h3>کانفیگ‌ها</h3>

<span id="configsCount">0</span>

</div>

<div class="card">

<h3>فعال</h3>

<span id="activeCount">0</span>

</div>

</div>

</div>

<div class="topbar">

<div>

<h2>داشبورد</h2>

<p>پنل مدیریت شاهین</p>

</div>

</div>

<div class="cards">

<div class="card">

<h3>کاربران</h3>

<span id="usersCount">0</span>

</div>

<div class="card">

<h3>کانفیگ‌ها</h3>

<span id="configsCount">0</span>

</div>

<div class="card">

<h3>فعال</h3>

<span id="activeCount">0</span>

</div>

</div>

</div>

</div>
<!-- صفحه کاربران -->

<div id="users-page" style="display:none;">

<div class="box">

<h2>کاربران</h2>

<input id="username" placeholder="نام کاربر">

<select id="protocol">

<option>VLESS</option>

<option>VMESS</option>

<option>Trojan</option>

</select>

<input id="volume" placeholder="حجم (GB)">

<button onclick="createUser()">

ساخت کاربر

</button>

<div id="usersList"></div>

</div>

</div>
<!-- صفحه کانفیگ -->

<div id="configs-page" style="display:none;">

<div class="box">

<h2>کانفیگ‌ها</h2>

<div id="configsList">

هنوز کانفیگی ساخته نشده

</div>

</div>

</div>
<!-- صفحه تنظیمات -->

<div id="settings-page" style="display:none;">

<div class="box">

<h2>تنظیمات</h2>

<input id="githubLink" placeholder="لینک GitHub">

<button onclick="saveSettings()">

ذخیره تنظیمات

</button>

</div>

</div>
<!-- صفحه GitHub -->

<div id="github-page" style="display:none;">

<div class="box">

<h2>GitHub</h2>

<p id="githubText">

لینکی ثبت نشده است.

</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
