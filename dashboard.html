<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شاهین پنل - Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:tahoma;
}

body{
margin:0;
background:#080c12;
color:white;
display:flex;
}


/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#111820;
padding:20px;
position:fixed;
right:0;
}

.logo{
font-size:35px;
text-align:center;
margin-bottom:30px;
}


.menu{
background:#18212c;
padding:15px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}


.menu:hover{
background:#00c853;
}



/* Main */

.main{
margin-right:270px;
padding:25px;
width:100%;
}


.header{
background:#111820;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
}


h1{
color:#00d4ff;
}


.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:20px;

}


.card{

background:#111820;
padding:25px;
border-radius:20px;
text-align:center;

}


.number{

font-size:35px;
color:#00d4ff;
font-weight:bold;

}



.box{

background:#111820;
margin-top:25px;
padding:25px;
border-radius:20px;

}


input,select{

width:100%;
padding:14px;
margin:8px 0;
background:#202a35;
border:0;
border-radius:10px;
color:white;

}


button{

width:100%;
padding:14px;
background:#00c853;
border:0;
border-radius:10px;
font-weight:bold;
cursor:pointer;

}


.user{

background:#202a35;
padding:15px;
border-radius:12px;
margin-top:10px;

}


</style>

</head>


<body>


<div class="sidebar">

<div class="logo">
🦅
</div>


<div class="menu">
🏠 داشبورد
</div>


<div class="menu">
👥 کاربران
</div>


<div class="menu">
⚙️ تنظیمات
</div>


<div class="menu">
🔑 امنیت
</div>


</div>



<div class="main">


<div class="header">

<h1>
شاهین پنل
</h1>


<div>
مدیریت پنل
</div>


</div>
<div class="cards">


<div class="card">
<div class="number" id="users">
0
</div>

کاربران
</div>



<div class="card">
<div class="number" id="configs">
0
</div>

کانفیگ ها
</div>



<div class="card">

<div class="number">
∞
</div>

حجم

</div>


</div>




<div class="box">

<h2>
ساخت کانفیگ جدید
</h2>


<input id="name" placeholder="نام کاربر">



<select id="type">

<option>
VLESS
</option>

<option>
VMESS
</option>

<option>
Trojan
</option>

</select>



<input id="volume" placeholder="حجم (GB)">



<button onclick="createConfig()">

ساخت کانفیگ

</button>


</div>





<div class="box">

<h2>
لیست کاربران
</h2>


<div id="list">


<div class="user">
هنوز کاربری ساخته نشده
</div>


</div>


</div>





<div class="box">

<h2>
تنظیمات پنل
</h2>


<p>
وضعیت سیستم:
<span style="color:#00c853">
فعال
</span>
</p>


<p>
نسخه پنل: 1.0
</p>


<button onclick="logout()">
خروج
</button>


</div>



</div>
<script>


let users = 0;
let configs = 0;



function createConfig(){


let name = document.getElementById("name").value;

let type = document.getElementById("type").value;

let volume = document.getElementById("volume").value;



if(name==""){

alert("نام کاربر را وارد کنید");

return;

}



users++;
configs++;



document.getElementById("users").innerHTML = users;

document.getElementById("configs").innerHTML = configs;




let list = document.getElementById("list");



list.innerHTML += `

<div class="user">

🦅 ${name}

<br>

نوع:
${type}

<br>

حجم:
${volume} GB

<br>

وضعیت:
<span style="color:#00c853">

فعال

</span>


</div>

`;



document.getElementById("name").value="";

document.getElementById("volume").value="";



}





function logout(){

window.location="index.html";

}



</script>


</body>

</html>
