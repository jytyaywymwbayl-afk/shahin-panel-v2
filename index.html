<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شاهین پنل</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Vazirmatn",sans-serif;
}

body{

background:#080C12;
color:#fff;
overflow-x:hidden;

}

a{
text-decoration:none;
color:inherit;
}

:root{

--bg:#080C12;
--card:#111820;
--card2:#18212C;
--primary:#00D4FF;
--success:#00C853;
--danger:#FF5252;
--text:#ffffff;
--muted:#9ca3af;

}

.sidebar{

position:fixed;
top:0;
right:0;
width:260px;
height:100vh;
background:var(--card);
padding:25px;
transition:.3s;
z-index:1000;

}

.logo{

display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:30px;
font-weight:800;
color:var(--primary);
margin-bottom:35px;

}

.menu{

display:flex;
flex-direction:column;
gap:12px;

}

.menu-item{

padding:14px 16px;
background:var(--card2);
border-radius:12px;
cursor:pointer;
transition:.25s;

}

.menu-item:hover{

background:var(--primary);
color:#000;

}

.main{

margin-right:260px;
padding:25px;
transition:.3s;

}

.topbar{

background:var(--card);
border-radius:18px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;

}

.mobile-btn{

display:none;
position:fixed;
right:15px;
top:15px;
background:var(--primary);
color:#000;
padding:10px 14px;
border-radius:12px;
font-size:24px;
font-weight:bold;
cursor:pointer;
z-index:1500;

}

.overlay{

display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:900;

}
.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(190px,1fr));

gap:18px;

margin-top:20px;

}

.card{

background:var(--card);

border-radius:18px;

padding:22px;

transition:.25s;

}

.card:hover{

transform:translateY(-4px);

}

.card-title{

font-size:14px;

color:var(--muted);

margin-bottom:10px;

}

.card-value{

font-size:34px;

font-weight:800;

color:var(--primary);

}

.section{

margin-top:25px;

background:var(--card);

border-radius:20px;

padding:22px;

}

.section-title{

font-size:22px;

font-weight:700;

margin-bottom:20px;

}

.form-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

}

input,select{

width:100%;

padding:14px;

background:var(--card2);

border:1px solid transparent;

border-radius:12px;

color:white;

outline:none;

}

input:focus,select:focus{

border-color:var(--primary);

}

button{

padding:14px 18px;

background:var(--primary);

color:#000;

border:0;

border-radius:12px;

font-weight:700;

cursor:pointer;

transition:.2s;

}

button:hover{

opacity:.9;

}

.btn-danger{

background:var(--danger);

color:#fff;

}

.user-list{

display:flex;

flex-direction:column;

gap:12px;

margin-top:20px;

}

.user-card{

background:var(--card2);

padding:18px;

border-radius:14px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;

}

.user-info{

display:flex;

flex-direction:column;

gap:6px;

}

.user-actions{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.small{

font-size:13px;

color:var(--muted);

}
@media(max-width:900px){

.sidebar{

right:-280px;

}

.sidebar.active{

right:0;

}

.overlay.active{

display:block;

}

.mobile-btn{

display:block;

}

.main{

margin-right:0;

padding:70px 15px 20px;

}

.topbar{

flex-direction:column;

gap:10px;

align-items:flex-start;

}

.cards{

grid-template-columns:1fr;

}

.form-grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="mobile-btn" onclick="toggleMenu()">
☰
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">

<div class="logo">

🦅 شاهین

</div>

<div class="menu">

<div class="menu-item" onclick="showPage('dashboard')">
🏠 داشبورد
</div>

<div class="menu-item" onclick="showPage('users')">
👥 کاربران
</div>

<div class="menu-item" onclick="showPage('configs')">
📡 کانفیگ‌ها
</div>

<div class="menu-item" onclick="showPage('settings')">
⚙ تنظیمات
</div>

<div class="menu-item" onclick="showPage('github')">
🌐 گیت‌هاب
</div>

</div>

</div>

<div class="main">

<div class="topbar">

<div>

<h2>شاهین پنل</h2>

<div class="small">
پنل مدیریت
</div>

</div>

<div>

ادمین

</div>

</div>
<!-- DASHBOARD -->

<div id="dashboard-page">

<div class="cards">

<div class="card">

<div class="card-title">

کاربران

</div>

<div id="usersCount" class="card-value">

0

</div>

</div>



<div class="card">

<div class="card-title">

کانفیگ‌ها

</div>

<div id="configsCount" class="card-value">

0

</div>

</div>



<div class="card">

<div class="card-title">

فعال

</div>

<div id="activeCount" class="card-value">

0

</div>

</div>



<div class="card">

<div class="card-title">

GitHub

</div>

<div class="card-value">

🦅

</div>

</div>

</div>

</div>





<!-- USERS -->

<div id="users-page" style="display:none;">

<div class="section">

<div class="section-title">

ساخت کاربر جدید

</div>

<div class="form-grid">

<input id="username" placeholder="نام کاربر">

<select id="protocol">

<option>VLESS</option>

<option>VMESS</option>

<option>Trojan</option>

</select>

<input id="volume" placeholder="حجم (GB)">

<button onclick="createUser()">

ساخت کاربر

</button>

</div>

</div>





<div class="section">

<div class="section-title">

لیست کاربران

</div>

<div id="usersList" class="user-list">

</div>

</div>

</div>
<!-- CONFIGS -->

<div id="configs-page" style="display:none;">

<div class="section">

<div class="section-title">

کانفیگ‌های ساخته شده

</div>

<div id="configsList" class="user-list">

<div class="user-card">

<div class="user-info">

هنوز کانفیگی ساخته نشده

</div>

</div>

</div>

</div>

</div>





<!-- SETTINGS -->

<div id="settings-page" style="display:none;">

<div class="section">

<div class="section-title">

تنظیمات پنل

</div>

<div class="form-grid">

<input id="panelTitle" placeholder="نام پنل" value="شاهین پنل">

<input id="adminName" placeholder="نام مدیر" value="admin">

<input id="githubLink" placeholder="لینک گیت هاب">

<button onclick="saveSettings()">

ذخیره تنظیمات

</button>

</div>

</div>

</div>





<!-- GITHUB -->

<div id="github-page" style="display:none;">

<div class="section">

<div class="section-title">

گیت هاب پروژه

</div>

<p id="githubText">

هنوز لینکی ثبت نشده

</p>

<button onclick="openGithub()">

باز کردن گیت هاب

</button>

</div>

</div>
<script>

let users = JSON.parse(localStorage.getItem("shahin_users")) || [];

let settings = JSON.parse(localStorage.getItem("shahin_settings")) || {

title:"شاهین پنل",

admin:"admin",

github:""

};


function saveData(){

localStorage.setItem("shahin_users",JSON.stringify(users));

localStorage.setItem("shahin_settings",JSON.stringify(settings));

// ===============================
// تولید لینک کانفیگ نمایشی
// ===============================

function generateConfig(user){

let config =
`vless://xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx@your-domain.com:443?security=tls&type=ws&host=your-domain.com&path=/ws#${user.name}`;

return config;

}


// نمایش کانفیگ

function showConfig(id){

let user = users.find(x=>x.id===id);

if(!user) return;

let cfg = generateConfig(user);

navigator.clipboard.writeText(cfg);

alert("کانفیگ کپی شد");

}
updateDashboard();

renderUsers();

}


function updateDashboard(){

document.getElementById("usersCount").innerHTML=users.length;

document.getElementById("configsCount").innerHTML=users.length;

document.getElementById("activeCount").innerHTML=users.length;

document.getElementById("githubText").innerHTML=settings.github || "هنوز لینکی ثبت نشده";

document.getElementById("panelTitle").value=settings.title;

document.getElementById("adminName").value=settings.admin;

document.getElementById("githubLink").value=settings.github;

}


function showPage(page){

document.getElementById("dashboard-page").style.display="none";

document.getElementById("users-page").style.display="none";

document.getElementById("configs-page").style.display="none";

document.getElementById("settings-page").style.display="none";

document.getElementById("github-page").style.display="none";

document.getElementById(page+"-page").style.display="block";

if(window.innerWidth<900){

toggleMenu();

}

}
function toggleMenu(){

document.getElementById("sidebar").classList.toggle("active");

document.getElementById("overlay").classList.toggle("active");

}



function createUser(){

let username=document.getElementById("username").value.trim();

let protocol=document.getElementById("protocol").value;

let volume=document.getElementById("volume").value.trim();



if(username==""){

alert("نام کاربر را وارد کنید");

return;

}



let user={

id:Date.now(),

name:username,

protocol:protocol,

volume:volume,

status:"فعال",

date:new Date().toLocaleDateString("fa-IR")

};



users.push(user);

saveData();

document.getElementById("username").value="";

document.getElementById("volume").value="";

showPage("configs");

}
function renderUsers(){

let list=document.getElementById("usersList");

let configs=document.getElementById("configsList");

list.innerHTML="";
configs.innerHTML="";

if(users.length==0){

list.innerHTML=`
<div class="user-card">
<div class="user-info">
هنوز کاربری ساخته نشده
</div>
</div>
`;

configs.innerHTML=`
<div class="user-card">
<div class="user-info">
هنوز کانفیگی ساخته نشده
</div>
</div>
`;

return;

}

users.forEach((u,index)=>{

list.innerHTML+=`

<div class="user-card">

<div class="user-info">

<b>🦅 ${u.name}</b>

<span class="small">
${u.protocol}
</span>

<span class="small">
${u.volume} GB
</span>

<span class="small">
${u.date}
</span>

</div>

<div class="user-actions">

<button onclick="showConfig(${u.id})">
کانفیگ
</button>

<button onclick="deleteUser(${u.id})" class="btn-danger">
حذف
</button>

</div>

</div>

`;

configs.innerHTML+=`

<div class="user-card">

<div class="user-info">

کانفیگ ${u.name}

<br>

نوع:
${u.protocol}

<br>

حجم:
${u.volume} GB

<br>

وضعیت:
${u.status}

</div>

</div>

`;

});

}
function deleteUser(id){

if(!confirm("کاربر حذف شود؟")) return;

users = users.filter(u => u.id !== id);

saveData();

}



function saveSettings(){

settings.title = document.getElementById("panelTitle").value;

settings.admin = document.getElementById("adminName").value;

settings.github = document.getElementById("githubLink").value;

saveData();

alert("تنظیمات ذخیره شد");

}



function openGithub(){

if(settings.github==""){

alert("لینک گیت‌هاب ثبت نشده");

return;

}

window.open(settings.github,"_blank");

}



updateDashboard();

renderUsers();

</script>

</body>

</html>
